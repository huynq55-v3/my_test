<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Collatz Latent Space Autoencoder Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f111a;
            --bg-card: #181b28;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
            --border-color: #2f3542;
            --green: #2ed573;
            --blue: #54a0ff;
        }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #a8ff78, #78ffd6, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px var(--accent-glow);
            border-color: var(--accent);
        }

        .card-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Space Mono', monospace;
            color: var(--green);
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            height: 450px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .full-width-chart {
            grid-column: 1 / -1;
            height: 600px;
        }

        .footer {
            margin-top: 50px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            font-family: 'Space Mono', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>COLLATZ LATENT SPACE AUTOENCODER</h1>
        <div class="subtitle">AI learns the hidden periodic dynamics of the Collatz transformation</div>

        <div class="summary-grid">
            <div class="card">
                <div class="card-title">Converged Theta</div>
                <div class="card-value" id="val-theta" style="color: #ffd32a;">--</div>
            </div>
            <div class="card">
                <div class="card-title">Final Total Loss</div>
                <div class="card-value" id="val-loss" style="color: #6c5ce7;">--</div>
            </div>
            <div class="card">
                <div class="card-title">Final Reconstruction Loss</div>
                <div class="card-value" id="val-recon" style="color: #2ed573;">--</div>
            </div>
            <div class="card">
                <div class="card-title">Final Dynamic Loss</div>
                <div class="card-value" id="val-dyn" style="color: #54a0ff;">--</div>
            </div>
            <div class="card">
                <div class="card-title">Final Repulsion Loss</div>
                <div class="card-value" id="val-rep" style="color: #ff9f43;">--</div>
            </div>
        </div>

        <div class="chart-grid">
            <div class="chart-card">
                <div id="loss-chart" style="width:100%;height:100%;"></div>
            </div>
            <div class="chart-card">
                <div id="theta-chart" style="width:100%;height:100%;"></div>
            </div>
            <div class="chart-card full-width-chart">
                <div id="latent-chart" style="width:100%;height:100%;"></div>
            </div>
        </div>

        <div class="footer">
            Generated by Antigravity AI - Collatz Latent Space Probe
        </div>
    </div>

    <script>
        // Injected data
        const data = REPORT_DATA_PLACEHOLDER;

        // Populate summary values
        document.getElementById('val-theta').innerText = data.final_theta.toFixed(2) + '°';
        document.getElementById('val-loss').innerText = data.loss_history[data.loss_history.length - 1].toFixed(6);
        document.getElementById('val-recon').innerText = data.recon_loss_history[data.recon_loss_history.length - 1].toFixed(6);
        document.getElementById('val-dyn').innerText = data.dyn_loss_history[data.dyn_loss_history.length - 1].toFixed(6);
        document.getElementById('val-rep').innerText = data.rep_loss_history[data.rep_loss_history.length - 1].toFixed(6);

        const darkPlotlyLayout = {
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#f1f2f6', family: 'Outfit, sans-serif' },
            xaxis: { 
                gridcolor: '#222533', 
                zerolinecolor: '#2f3542',
                tickfont: { size: 11 }
            },
            yaxis: { 
                gridcolor: '#222533', 
                zerolinecolor: '#2f3542',
                tickfont: { size: 11 }
            },
            margin: { t: 50, b: 40, l: 50, r: 20 },
            legend: {
                orientation: 'h',
                y: -0.15,
                x: 0.5,
                xanchor: 'center'
            }
        };

        // 1. Loss Chart
        const epochs = Array.from({length: data.loss_history.length}, (_, i) => i + 1);
        Plotly.newPlot('loss-chart', [
            { x: epochs, y: data.loss_history, name: 'Total Loss', type: 'scatter', line: { color: '#6c5ce7', width: 3 } },
            { x: epochs, y: data.recon_loss_history, name: 'Recon Loss', type: 'scatter', line: { color: '#2ed573', dash: 'dot', width: 2 } },
            { x: epochs, y: data.dyn_loss_history, name: 'Dynamic Loss', type: 'scatter', line: { color: '#54a0ff', dash: 'dot', width: 2 } },
            { x: epochs, y: data.rep_loss_history, name: 'Repulsion Loss', type: 'scatter', line: { color: '#ff9f43', dash: 'dot', width: 2 } }
        ], {
            ...darkPlotlyLayout,
            title: '<b>Training Loss History</b>',
            yaxis: { ...darkPlotlyLayout.yaxis, type: 'log' }
        });

        // 2. Theta Chart
        Plotly.newPlot('theta-chart', [
            { x: epochs, y: data.theta_history, name: 'Theta (deg)', type: 'scatter', line: { color: '#ffd32a', width: 3 } }
        ], {
            ...darkPlotlyLayout,
            title: '<b>Theta (Rotation Angle) Evolution</b>',
            yaxis: { ...darkPlotlyLayout.yaxis, title: 'Degrees' }
        });

        // 3. Latent Space Trajectories
        const traces = [];
        
        // Add unit circle outline for reference
        const circle_theta = Array.from({length: 100}, (_, i) => i * 2 * Math.PI / 99);
        traces.push({
            x: circle_theta.map(t => Math.cos(t)),
            y: circle_theta.map(t => Math.sin(t)),
            mode: 'lines',
            name: 'Unit Circle',
            line: { color: 'rgba(255, 255, 255, 0.12)', dash: 'dash', width: 1.5 },
            showlegend: false
        });

        data.trajectories.forEach((traj, index) => {
            const xs = traj.points.map(p => p.x);
            const ys = traj.points.map(p => p.y);
            const texts = traj.points.map(p => `Step ${p.step}: n = ${p.val}<br>Latent: (${p.x.toFixed(3)}, ${p.y.toFixed(3)})`);
            
            // Add lines with arrows or indicators
            traces.push({
                x: xs,
                y: ys,
                text: texts,
                mode: 'lines+markers+text',
                name: `Start: ${traj.start_val}`,
                marker: { size: 8, symbol: 'circle' },
                line: { width: 2 },
                textposition: 'top center',
                hoverinfo: 'text'
            });
        });

        Plotly.newPlot('latent-chart', traces, {
            ...darkPlotlyLayout,
            title: '<b>Latent Space 2D Trajectories (Unit Circle Projection)</b>',
            xaxis: { ...darkPlotlyLayout.xaxis, scaleanchor: 'y', scaleratio: 1, range: [-1.2, 1.2], title: 'Dimension 1' },
            yaxis: { ...darkPlotlyLayout.yaxis, range: [-1.2, 1.2], title: 'Dimension 2' }
        });
    </script>
</body>
</html>
